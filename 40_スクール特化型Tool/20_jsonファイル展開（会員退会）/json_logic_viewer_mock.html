<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>業務ロジック タイムラインビューアー</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <h1>業務ロジック タイムラインビューアー</h1>

  <div class="controls">
    <label class="btn btn-file" for="fileInput">
      <span class="material-symbols-outlined">upload_file</span>
      <span>JSONを選択</span>
    </label>
    <input type="file" id="fileInput" accept=".json" />
    <button class="btn" onclick="expandAll()">
      <span class="material-symbols-outlined">unfold_more</span>
      <span>すべて展開</span>
    </button>
    <button class="btn" onclick="collapseAll()">
      <span class="material-symbols-outlined">unfold_less</span>
      <span>すべて折りたたみ</span>
    </button>
    <span id="fileName" class="file-name">未選択</span>
  </div>

  <div id="commonInfo" class="card" style="display:none;"></div>
  <div id="tabs" class="tabs"></div>
  <div id="output"></div>

  <script src="assets/js/app.js"></script>
</body>
</html>
